<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="経費精算">
<meta name="theme-color" content="#2563eb">
<title>経費精算アプリ</title>
<style>
:root {
  --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8;
  --success: #16a34a; --success-light: #f0fdf4; --danger: #dc2626;
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280;
  --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow: 0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --r: 10px; --rs: 6px; --rl: 16px;
  --bottom-nav-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic UI',Meiryo,sans-serif;
  background:#f0f4f8;color:var(--gray-800);
  min-height:100%;padding-bottom:calc(var(--bottom-nav-h) + var(--safe-bottom));
}

/* ===== HEADER ===== */
.app-header{
  background:white;border-bottom:1px solid var(--gray-200);
  padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);
}
.app-title{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700;color:var(--primary)}
.app-title svg{width:22px;height:22px}

/* ===== BOTTOM NAV & TABS ===== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--bottom-nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);
  background:white;border-top:1px solid var(--gray-200);
  display:flex;z-index:200;box-shadow:0 -2px 12px rgba(0,0,0,.08);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:transparent;cursor:pointer;
  color:var(--gray-400);font-size:10px;font-weight:600;font-family:inherit;padding:8px 4px;
  -webkit-user-select:none;user-select:none;
}
.nav-btn .nav-icon{font-size:22px;line-height:1;}
.nav-btn.active{color:var(--primary)}
.nav-btn.fab-btn{position:relative;color:white;}
.nav-btn.fab-btn .fab-circle{
  width:52px;height:52px;background:var(--primary);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 4px 14px rgba(37,99,235,.5);position:absolute;top:-16px;
}
.desktop-tabs{display:none}
@media(min-width:640px){
  .bottom-nav{display:none}
  .desktop-tabs{display:flex;gap:4px;background:var(--gray-100);border-radius:var(--rs);padding:3px}
  body{padding-bottom:0}
}
.tab-btn{padding:6px 14px;border:none;background:transparent;color:var(--gray-500);font-size:13px;font-weight:500;border-radius:4px;cursor:pointer;font-family:inherit;}
.tab-btn.active{background:white;color:var(--primary);box-shadow:var(--shadow-sm);font-weight:600}

/* ===== MAIN & CARDS ===== */
.main{max-width:640px;margin:0 auto;padding:16px 12px;display:flex;flex-direction:column;gap:14px}
@media(min-width:640px){.main{max-width:960px;padding:24px 16px;gap:20px}}
.card{background:white;border-radius:var(--rl);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:14px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:600;color:var(--gray-700);display:flex;align-items:center;gap:6px}
.card-body{padding:16px}

/* ===== PROFILE ===== */
.api-section{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1px solid var(--gray-200);border-radius:var(--rl);padding:12px 14px}
.api-row{display:flex;align-items:center;gap:8px}
.api-label{font-size:12px;font-weight:700;color:var(--gray-700);white-space:nowrap}
.api-input{
  flex:1;padding:9px 10px;border:1.5px solid var(--gray-200);
  border-radius:var(--rs);font-size:14px;background:white;outline:none;
  font-family:inherit;font-weight:bold;
}
.api-input:focus{border-color:var(--primary)}

/* ===== UPLOAD AREA ===== */
.capture-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.capture-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding:20px 10px;border:2px dashed var(--gray-300);border-radius:var(--r);
  background:var(--gray-50);cursor:pointer;position:relative;color:var(--gray-600);
}
.capture-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.capture-btn-icon{font-size:28px}
.capture-btn-text{font-size:12px;font-weight:600}

.upload-zone{
  border:2px dashed var(--gray-300);border-radius:var(--r);padding:28px 16px;
  text-align:center;cursor:pointer;background:var(--gray-50);position:relative;
}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:36px;margin-bottom:10px;display:block}
.upload-text{font-size:13px;color:var(--gray-600);margin-bottom:3px}

/* ===== PREVIEW & FORM ===== */
.preview-wrap{display:none}
.preview-wrap.show{display:block}
.preview-inner{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px}
.receipt-thumb{
  flex:0 0 auto;width:120px;border-radius:var(--r);
  overflow:hidden;border:2px solid var(--gray-200);background:var(--gray-100);
}
.receipt-thumb img{width:100%;height:160px;object-fit:contain;display:block}

.expense-form{width:100%}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;}
.form-label.req::after{content:"必須";background:var(--danger);color:white;font-size:9px;padding:2px 4px;border-radius:3px;margin-left:4px;vertical-align:middle}
.form-control{
  padding:11px 12px;border:1.5px solid var(--gray-200);border-radius:var(--rs);
  font-size:16px;outline:none;width:100%;background:white;font-family:inherit;
}
.form-control:focus{border-color:var(--primary)}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;
  border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
}
.btn-primary{background:var(--primary);color:white}
.btn-success{background:var(--success);color:white;width:100%;font-size:15px;padding:14px}
.btn-ghost{background:transparent;color:var(--gray-600);border:1.5px solid var(--gray-200)}
.btn-sm{padding:7px 12px;font-size:12px}

/* ===== LIST ===== */
.table-wrap{overflow-x:auto}
.cat-badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.no-data{text-align:center;padding:40px 16px;color:var(--gray-400);font-size:13px;}
.expense-cards{display:flex;flex-direction:column;}
.expense-card{
  display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--gray-100);
}
.expense-card-left{flex:1;min-width:0}
.expense-card-store{font-size:14px;font-weight:600;color:var(--gray-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.expense-card-meta{font-size:11px;color:var(--gray-400);margin-top:2px}
.expense-card-amount{font-size:16px;font-weight:800;color:var(--primary);white-space:nowrap}
.expense-card-del{color:var(--gray-300);font-size:18px;padding:4px;border:none;background:none;cursor:pointer;}

/* ===== SUMMARY ===== */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.summary-card{background:var(--gray-50);border-radius:var(--r);padding:12px;text-align:center;border:1px solid var(--gray-200)}
.summary-label{font-size:10px;color:var(--gray-500);font-weight:700;margin-bottom:4px}
.summary-value{font-size:20px;font-weight:800;color:var(--primary);}
.cat-交通費{background:#dbeafe;color:#1d4ed8}
.cat-食費・接待費{background:#fef3c7;color:#92400e}
.cat-消耗品費{background:#d1fae5;color:#065f46}
.cat-通信費{background:#ede9fe;color:#5b21b6}
.cat-宿泊費{background:#ffe4e6;color:#9f1239}
.cat-書籍・研修費{background:#e0f2fe;color:#0369a1}
.cat-その他{background:#f3f4f6;color:#374151}

.tab-panel{display:none}
.tab-panel.active{display:flex;flex-direction:column;gap:14px}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="5" width="14" height="16" rx="2"/>
      <path d="M7 9h6M7 12h6M7 15h4"/>
      <path d="M17 3v4M21 7H17" stroke-width="2.5"/>
    </svg>
    経費精算アプリ
  </div>
  <nav class="desktop-tabs">
    <button class="tab-btn active" onclick="switchTab('input',this)">📝 入力</button>
    <button class="tab-btn" onclick="switchTab('list',this)">📋 一覧</button>
    <button class="tab-btn" onclick="switchTab('summary',this)">📊 集計</button>
  </nav>
</header>

<main class="main">

  <div class="api-section">
    <div class="api-row">
      <span class="api-label">👤 あなたの氏名</span>
      <input type="text" class="api-input" id="nameInput" placeholder="山田 太郎" oninput="saveName(this.value)">
    </div>
  </div>

  <!-- ===== INPUT PANEL ===== -->
  <div class="tab-panel active" id="panel-input">
    <div class="card">
      <div class="card-header">
        <span class="card-title">📷 レシート撮影・入力</span>
        <button class="btn btn-ghost btn-sm" onclick="resetForm()">リセット</button>
      </div>
      <div class="card-body">

        <div id="uploadSection">
          <div class="capture-btns">
            <label class="capture-btn">
              <input type="file" accept="image/*" capture="environment" onchange="handleFile(this.files[0])">
              <span class="capture-btn-icon">📸</span>
              <span class="capture-btn-text">カメラで撮る</span>
            </label>
            <label class="capture-btn">
              <input type="file" accept="image/*" onchange="handleFile(this.files[0])">
              <span class="capture-btn-icon">🖼️</span>
              <span class="capture-btn-text">写真を選ぶ</span>
            </label>
          </div>
          <div class="upload-zone" id="dropZone">
            <input type="file" accept="image/*" onchange="handleFile(this.files[0])">
            <span class="upload-icon">📄</span>
            <div class="upload-text">ここにドロップ（PC）</div>
          </div>
        </div>

        <!-- Preview & Form -->
        <div class="preview-wrap" id="previewWrap">
          <div class="preview-inner">
            <div class="receipt-thumb"><img id="receiptImg" src="" alt="レシート"></div>
          </div>

          <div class="expense-form" id="expenseForm">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label req">📅 日付</label>
                <input type="date" class="form-control" id="fDate">
              </div>
              <div class="form-group">
                <label class="form-label req">💴 税込金額</label>
                <input type="number" class="form-control" id="fAmount" placeholder="0" min="0" inputmode="numeric">
              </div>
              <div class="form-group">
                <label class="form-label">📁 カテゴリ</label>
                <select class="form-control" id="fCategory">
                  <option value="交通費">🚃 交通費</option>
                  <option value="食費・接待費">🍽️ 食費・接待費</option>
                  <option value="消耗品費">📦 消耗品費</option>
                  <option value="通信費">📱 通信費</option>
                  <option value="宿泊費">🏨 宿泊費</option>
                  <option value="書籍・研修費">📚 書籍・研修費</option>
                  <option value="その他">📌 その他</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">📊 消費税率</label>
                <select class="form-control" id="fTax">
                  <option value="10">10%</option>
                  <option value="8">軽減8% (食料品など)</option>
                  <option value="0">対象外</option>
                </select>
              </div>
              <div class="form-group full">
                <label class="form-label req">🏪 店名・支払先</label>
                <input type="text" class="form-control" id="fStore" placeholder="例：セブンイレブン">
              </div>
              <div class="form-group full">
                <label class="form-label">📝 摘要・メモ</label>
                <input type="text" class="form-control" id="fMemo" placeholder="用途など（任意）">
              </div>
            </div>
            <div style="margin-top:14px;display:flex;gap:8px;flex-direction:column">
              <button class="btn btn-success" onclick="saveExpense()">💾 保存する</button>
              <button class="btn btn-ghost" onclick="resetForm()" style="justify-content:center">キャンセル</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== LIST PANEL ===== -->
  <div class="tab-panel" id="panel-list">
    <div class="card">
      <div class="card-header">
        <span class="card-title">📋 経費一覧</span>
        <button class="btn btn-primary btn-sm" onclick="exportJSON()">📤 管理者へ申請</button>
      </div>
      <div class="expense-cards" id="expenseCards"></div>
      <div class="no-data" id="noData">経費が登録されていません。<br>「＋」ボタンから追加してください。</div>
    </div>
  </div>

  <!-- ===== SUMMARY PANEL ===== -->
  <div class="tab-panel" id="panel-summary">
    <div class="card">
      <div class="card-header"><span class="card-title">📊 総合集計</span></div>
      <div class="card-body">
        <div class="summary-grid" id="summaryGrid"></div>
        <div style="font-size:11px;font-weight:700;color:var(--gray-500);margin-bottom:10px">カテゴリ別内訳</div>
        <div id="catBreakdown"></div>
      </div>
    </div>
  </div>

</main>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-input" onclick="switchTab('input',null,'nav-input')">
    <span class="nav-icon">📝</span>入力
  </button>
  <button class="nav-btn fab-btn" onclick="switchTab('input',null,'nav-input');setTimeout(()=>document.querySelector('.capture-btn input').click(),100)">
    <div class="fab-circle">＋</div>
  </button>
  <button class="nav-btn" id="nav-list" onclick="switchTab('list',null,'nav-list')">
    <span class="nav-icon">📋</span>一覧
  </button>
  <button class="nav-btn" id="nav-summary" onclick="switchTab('summary',null,'nav-summary')">
    <span class="nav-icon">📊</span>集計
  </button>
</nav>

<script>
let expenses = JSON.parse(localStorage.getItem('expenses_manual') || '[]');
let userName = localStorage.getItem('user_name_manual') || '';
let currentImgData = null;

document.addEventListener('DOMContentLoaded', () => {
  if (userName) document.getElementById('nameInput').value = userName;
  document.getElementById('fDate').value = today();
  setupDrop();
  renderAll();
});

function today() { return new Date().toISOString().split('T')[0]; }
function saveName(v) { userName = v.trim(); localStorage.setItem('user_name_manual', userName); }

function switchTab(tab, desktopBtn, navId) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (desktopBtn) desktopBtn.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (navId) document.getElementById(navId)?.classList.add('active');
  if (tab === 'list') renderList();
  if (tab === 'summary') renderSummary();
}

function setupDrop() {
  const zone = document.getElementById('dropZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]?.type.startsWith('image/')) handleFile(e.dataTransfer.files[0]);
  });
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    resizeImage(e.target.result, 800, resizedUrl => {
      currentImgData = resizedUrl;
      document.getElementById('uploadSection').style.display = 'none';
      document.getElementById('receiptImg').src = currentImgData;
      document.getElementById('previewWrap').classList.add('show');
    });
  };
  reader.readAsDataURL(file);
}

function resizeImage(dataUrl, maxWidth, callback) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    let width = img.width; let height = img.height;
    if (width > maxWidth) { height = Math.round(height * maxWidth / width); width = maxWidth; }
    canvas.width = width; canvas.height = height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, width, height);
    callback(canvas.toDataURL('image/jpeg', 0.6));
  };
  img.src = dataUrl;
}

function saveExpense() {
  const date = document.getElementById('fDate').value;
  const amount = parseInt(document.getElementById('fAmount').value);
  const store = document.getElementById('fStore').value.trim();
  const category = document.getElementById('fCategory').value;
  const tax = document.getElementById('fTax').value;
  const memo = document.getElementById('fMemo').value.trim();

  if (!userName) return alert('氏名を入力してください');
  if (!date) return alert('日付を入力してください');
  if (!amount || amount <= 0) return alert('正しい金額を入力してください');
  if (!store) return alert('店名を入力してください');

  expenses.unshift({ id: Date.now(), date, amount, store, category, tax, memo, img: currentImgData });
  
  try {
    localStorage.setItem('expenses_manual', JSON.stringify(expenses));
    alert('保存しました');
    resetForm();
    switchTab('list', document.querySelectorAll('.tab-btn')[1], 'nav-list');
  } catch(e) {
    alert('保存容量が限界です。「申請」ボタンでデータを出力後、一覧から削除してください。');
    expenses.shift();
  }
}

function resetForm() {
  currentImgData = null;
  document.getElementById('uploadSection').style.display = '';
  document.getElementById('previewWrap').classList.remove('show');
  document.getElementById('receiptImg').src = '';
  document.getElementById('fDate').value = today();
  document.getElementById('fAmount').value = '';
  document.getElementById('fStore').value = '';
  document.getElementById('fCategory').value = '交通費';
  document.getElementById('fTax').value = '10';
  document.getElementById('fMemo').value = '';
  document.querySelectorAll('input[type=file]').forEach(i => i.value = '');
}

function renderList() {
  const cards = document.getElementById('expenseCards');
  const noData = document.getElementById('noData');
  if (expenses.length === 0) { cards.innerHTML = ''; noData.style.display = 'block'; return; }
  noData.style.display = 'none';

  cards.innerHTML = expenses.map(e => `
    <div class="expense-card">
      <div class="expense-card-left">
        <div class="expense-card-store">${esc(e.store)} <span style="font-size:10px;color:#999">(${e.tax}%対象)</span></div>
        <div class="expense-card-meta">
          ${e.date} · <span class="cat-badge cat-${esc(e.category)}">${esc(e.category)}</span>
        </div>
      </div>
      <span class="expense-card-amount">¥${e.amount.toLocaleString()}</span>
      <button class="expense-card-del" onclick="deleteExpense(${e.id})">✕</button>
    </div>
  `).join('');
}

function deleteExpense(id) {
  if (!confirm('削除しますか？')) return;
  expenses = expenses.filter(e => e.id !== id);
  localStorage.setItem('expenses_manual', JSON.stringify(expenses));
  renderList();
}

function renderSummary() {
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card"><div class="summary-label">合計</div><div class="summary-value">¥${total.toLocaleString()}</div></div>
    <div class="summary-card"><div class="summary-label">件数</div><div class="summary-value">${expenses.length}件</div></div>
  `;

  const cats = {};
  expenses.forEach(e => cats[e.category] = (cats[e.category] || 0) + e.amount);
  const sorted = Object.entries(cats).sort((a,b) => b[1]-a[1]);
  const maxCat = sorted[0]?.[1] || 1;

  document.getElementById('catBreakdown').innerHTML = sorted.length
    ? sorted.map(([cat, amt]) => `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span class="cat-badge cat-${esc(cat)}" style="min-width:90px;text-align:center">${esc(cat)}</span>
        <div style="flex:1;background:var(--gray-100);border-radius:4px;height:18px;overflow:hidden">
          <div style="height:100%;width:${Math.round(amt/maxCat*100)}%;background:var(--primary);border-radius:4px"></div>
        </div>
        <span style="font-size:13px;font-weight:700;min-width:72px;text-align:right">¥${amt.toLocaleString()}</span>
      </div>`).join('')
    : '<div style="color:var(--gray-400);font-size:13px;padding:20px 0">データなし</div>';
}

function exportJSON() {
  if (!expenses.length) return alert('申請するデータがありません');
  if (!userName) return alert('氏名を入力してください');
  
  const payload = { name: userName, exportedAt: new Date().toISOString(), expenses: expenses };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'}));
  a.download = `経費申請_${userName}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function esc(s) { return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function renderAll() { renderList(); renderSummary(); }
</script>
