<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>経費精算アプリ（OCR自動入力版）</title>
<style>
:root {
  --primary: #2563eb; --primary-light: #eff6ff; --success: #16a34a; --success-light: #f0fdf4;
  --danger: #dc2626; --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-300: #d1d5db; --gray-400: #9ca3af; --gray-500: #6b7280; --gray-800: #1f2937;
  --shadow: 0 1px 3px rgba(0,0,0,.1);
  --r: 10px; --bottom-nav-h: 64px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#f0f4f8;color:var(--gray-800);min-height:100vh;padding-bottom:calc(var(--bottom-nav-h) + var(--safe-bottom))}

.app-header{background:white;border-bottom:1px solid var(--gray-200);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.app-title{font-size:17px;font-weight:700;color:var(--primary)}
.header-key-btn{font-size:11px;padding:6px 10px;border:1px solid var(--gray-200);border-radius:6px;background:white;color:var(--gray-500);cursor:pointer;white-space:nowrap}

.main{max-width:640px;margin:0 auto;padding:16px 12px;display:flex;flex-direction:column;gap:14px}
.card{background:white;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;padding:16px;margin-bottom:14px}

.form-label{display:block;font-size:11px;font-weight:700;color:var(--gray-500);margin-bottom:4px;text-transform:uppercase}
.form-label.req::after{content:"*";color:var(--danger);margin-left:2px}
.form-control{width:100%;padding:12px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:16px;outline:none;background:white;margin-bottom:10px;font-family:inherit}
.form-control:focus{border-color:var(--primary)}
.form-control.auto-filled{border-color:#22c55e;background:#f0fdf4}

.capture-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.capture-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:20px 10px;border:2px dashed var(--gray-300);border-radius:var(--r);background:var(--gray-50);cursor:pointer;position:relative;font-size:14px;font-weight:600;color:var(--gray-500)}
.capture-btn:hover{background:#eff6ff;border-color:var(--primary)}
.capture-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.capture-btn .icon{font-size:28px}

/* APIキー未設定バナー */
.no-key-banner{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px;color:#92400e;display:none}
.no-key-banner.show{display:block}
.no-key-banner a{color:var(--primary);font-weight:700}

.preview-wrap{display:none}
.preview-wrap.show{display:block}
.receipt-thumb{width:100%;border-radius:6px;border:2px solid var(--gray-200);overflow:hidden;margin-bottom:14px;background:#000;position:relative}
.receipt-thumb img{width:100%;max-height:300px;object-fit:contain;display:block;margin:0 auto}

/* OCR Loading Overlay */
.ocr-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.72);display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:4px}
.ocr-overlay.show{display:flex}
.ocr-spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ocr-text{color:white;font-size:13px;font-weight:600}
.ocr-progress-bar{width:80%;height:6px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden}
.ocr-progress-fill{height:100%;background:#22c55e;border-radius:3px;transition:width 0.4s}

/* OCR Result Banner */
.ocr-result-banner{display:none;padding:10px 12px;border-radius:8px;margin-bottom:12px;font-size:13px;font-weight:600;line-height:1.5}
.ocr-result-banner.show{display:block}
.ocr-result-banner.success{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.ocr-result-banner.partial{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.ocr-result-banner.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}

.btn{width:100%;padding:14px;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer}
.btn-success{background:var(--success);color:white}
.btn-primary{background:var(--primary);color:white}
.btn-ghost{background:transparent;color:var(--gray-500);border:1px solid var(--gray-200)}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--bottom-nav-h) + var(--safe-bottom));background:white;border-top:1px solid var(--gray-200);display:flex;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--gray-400);background:none;border:none;gap:2px}
.nav-btn.active{color:var(--primary)}

.expense-card{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--gray-100)}
.cat-badge{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--gray-100)}
.genba-section{background:#f0f7ff;padding:12px;border-radius:8px;margin-bottom:12px;border:1.5px solid #bfdbfe}

/* APIキー設定モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal-sheet{background:white;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--gray-500);margin-bottom:20px}
.step-row{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--primary);color:white;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-text{font-size:13px;line-height:1.6;color:var(--gray-800)}
.step-text a{color:var(--primary);font-weight:700;word-break:break-all}
</style>
</head>
<body>

<!-- APIキー設定モーダル -->
<div class="modal-bg" id="keyModal">
  <div class="modal-sheet">
    <div class="modal-title">🔑 OCR APIキー設定</div>
    <div class="modal-sub">無料キーの取得は1〜2分で完了します（初回のみ）</div>

    <div class="step-row">
      <div class="step-num">1</div>
      <div class="step-text">下のリンクにアクセス<br><a href="https://ocr.space/OCRAPI" target="_blank">https://ocr.space/OCRAPI</a></div>
    </div>
    <div class="step-row">
      <div class="step-num">2</div>
      <div class="step-text">「Free」プランの「Get API Key」をタップしてメールアドレスを登録</div>
    </div>
    <div class="step-row">
      <div class="step-num">3</div>
      <div class="step-text">届いたメールに記載のAPIキーを下に貼り付けて保存</div>
    </div>

    <label class="form-label" style="margin-top:8px">APIキー</label>
    <input type="text" class="form-control" id="keyInput" placeholder="例：K12345678901234" autocomplete="off" autocorrect="off" spellcheck="false">
    <div id="keyError" style="font-size:12px;color:var(--danger);margin-top:-6px;margin-bottom:10px;display:none"></div>

    <button class="btn btn-primary" onclick="saveApiKey()">💾 保存してOCRを使う</button>
    <button class="btn btn-ghost" style="margin-top:10px" onclick="closeKeyModal()">あとで設定する（手動入力）</button>
  </div>
</div>

<header class="app-header">
  <div class="app-title">📸 経費精算（OCR自動入力）</div>
  <button class="header-key-btn" onclick="openKeyModal()">🔑 APIキー</button>
</header>

<main class="main">
  <div class="card">
    <label class="form-label req">👤 氏名</label>
    <input type="text" class="form-control" id="userName" placeholder="山田 太郎" oninput="localStorage.setItem('user_name_v5', this.value)">
  </div>

  <div class="tab-panel active" id="panel-input">
    <div class="card">
      <div id="uploadSection">
        <div class="no-key-banner" id="noKeyBanner">
          ⚠️ OCR APIキーが未設定です。<a href="#" onclick="openKeyModal();return false;">ここをタップ</a>して無料キーを設定するとレシートを自動読み取りできます。
        </div>
        <div style="font-size:13px;color:var(--gray-500);margin-bottom:12px;text-align:center" id="ocrReadyMsg" style="display:none">
          📷 レシートを撮影すると金額・日付・店名を自動入力します
        </div>
        <div class="capture-btns">
          <label class="capture-btn">
            <input type="file" accept="image/*" capture="environment" onchange="handleFile(this.files[0])">
            <span class="icon">📸</span>
            <span>カメラで撮影</span>
          </label>
          <label class="capture-btn">
            <input type="file" accept="image/*" onchange="handleFile(this.files[0])">
            <span class="icon">🖼️</span>
            <span>写真を選択</span>
          </label>
        </div>
      </div>

      <div class="preview-wrap" id="previewWrap">
        <div class="receipt-thumb">
          <img id="receiptImg" src="">
          <div class="ocr-overlay" id="ocrOverlay">
            <div class="ocr-spinner"></div>
            <div class="ocr-text" id="ocrStatusText">🔍 解析中...</div>
            <div class="ocr-progress-bar"><div class="ocr-progress-fill" id="ocrProgressFill"></div></div>
          </div>
        </div>

        <div class="ocr-result-banner" id="ocrResultBanner"></div>

        <div id="formGrid">
          <label class="form-label req">📅 日付</label>
          <input type="date" class="form-control" id="fDate">

          <label class="form-label req">💴 金額（税込）</label>
          <input type="number" class="form-control" id="fAmount" placeholder="0" inputmode="numeric">

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div>
              <label class="form-label">📊 税率</label>
              <select class="form-control" id="fTax">
                <option value="10">10%</option>
                <option value="8">軽減8%</option>
                <option value="0">対象外</option>
              </select>
            </div>
            <div>
              <label class="form-label">📁 項目</label>
              <select class="form-control" id="fCategory">
                <option value="駐車場代">🚗 駐車場代</option>
                <option value="仕入高">🛠️ 仕入高</option>
                <option value="ガソリン">⛽ ガソリン</option>
                <option value="消耗品費">📦 消耗品費</option>
                <option value="事務用品">🖊️ 事務用品</option>
                <option value="運賃">🚚 運賃</option>
                <option value="その他交通費">🚕 交通費</option>
                <option value="会議費">☕ 会議費</option>
                <option value="交際費">🤝 交際費</option>
                <option value="水道光熱">💡 水道光熱</option>
                <option value="租税公課">📜 租税公課</option>
                <option value="福利厚生">🏥 福利厚生</option>
              </select>
            </div>
          </div>

          <label class="form-label req">🏪 店名</label>
          <input type="text" class="form-control" id="fStore" placeholder="例：コーナン">

          <div class="genba-section">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div>
                <label class="form-label">🏢 元請け名</label>
                <input type="text" class="form-control" id="fMotouke" placeholder="例：〇〇建設">
              </div>
              <div>
                <label class="form-label">📍 現場名</label>
                <input type="text" class="form-control" id="fGenba" placeholder="例：〇〇邸">
              </div>
            </div>
          </div>

          <label class="form-label">📝 メモ</label>
          <input type="text" class="form-control" id="fMemo" placeholder="任意">

          <button class="btn btn-success" onclick="saveExpense()">💾 保存して次へ</button>
          <button class="btn btn-ghost" style="margin-top:8px" onclick="resetForm()">キャンセル</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="panel-list" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:14px;align-items:center">
        <span style="font-weight:bold">📋 保存済み</span>
        <button class="btn btn-primary" style="width:auto;padding:8px 16px;font-size:12px" onclick="exportJSON()">📤 JSON出力</button>
      </div>
      <div id="expenseCards"></div>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-in" onclick="switchTab('input',this)">
    <span style="font-size:20px">📝</span>入力
  </button>
  <button class="nav-btn" id="nav-li" onclick="switchTab('list',this)">
    <span style="font-size:20px">📋</span>リスト
  </button>
</nav>

<script>
let expenses = JSON.parse(localStorage.getItem('exp_v5') || '[]');
let currentImg = null;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('userName').value = localStorage.getItem('user_name_v5') || '';
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  updateKeyUI();
  renderList();
});

// ==============================
// APIキー管理
// ==============================
function getApiKey() { return localStorage.getItem('ocr_api_key') || ''; }

function updateKeyUI() {
  const hasKey = !!getApiKey();
  document.getElementById('noKeyBanner').classList.toggle('show', !hasKey);
  const msg = document.getElementById('ocrReadyMsg');
  if (msg) msg.style.display = hasKey ? 'block' : 'none';
}

function openKeyModal() {
  document.getElementById('keyInput').value = getApiKey();
  document.getElementById('keyError').style.display = 'none';
  document.getElementById('keyModal').classList.add('show');
}

function closeKeyModal() {
  document.getElementById('keyModal').classList.remove('show');
}

function saveApiKey() {
  const key = document.getElementById('keyInput').value.trim();
  const errEl = document.getElementById('keyError');
  if (!key) {
    errEl.textContent = 'APIキーを入力してください';
    errEl.style.display = 'block';
    return;
  }
  localStorage.setItem('ocr_api_key', key);
  closeKeyModal();
  updateKeyUI();
}

// ==============================
// 画像ハンドリング
// ==============================
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.getElementById('panel-' + tab).style.display = 'block';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if(tab === 'list') renderList();
}

async function handleFile(file) {
  if(!file || !file.type.startsWith('image/')) return;
  currentImg = await resizeImg(file, 1200);
  document.getElementById('uploadSection').style.display = 'none';
  document.getElementById('receiptImg').src = currentImg;
  document.getElementById('previewWrap').classList.add('show');

  const key = getApiKey();
  if (!key) {
    showBanner('partial', '⚠️ APIキー未設定のため自動入力はスキップ。手動で入力してください。<br><a href="#" onclick="openKeyModal();return false;" style="color:#1d4ed8">🔑 APIキーを設定する</a>');
    return;
  }
  await runOCR(currentImg, key);
}

// ==============================
// OCR（OCR.space API）
// ==============================
async function runOCR(imgSrc, apiKey) {
  const overlay = document.getElementById('ocrOverlay');
  const statusText = document.getElementById('ocrStatusText');
  const progressFill = document.getElementById('ocrProgressFill');

  overlay.classList.add('show');
  statusText.textContent = '📤 送信中...';
  progressFill.style.width = '20%';
  hideBanner();

  try {
    statusText.textContent = '🔍 OCR解析中...';
    progressFill.style.width = '50%';

    const formData = new FormData();
    formData.append('apikey', apiKey);
    formData.append('base64Image', imgSrc);   // data:image/jpeg;base64,... をそのまま送る
    formData.append('language', 'jpn');
    formData.append('isOverlayRequired', 'false');
    formData.append('detectOrientation', 'true');
    formData.append('scale', 'true');
    formData.append('isTable', 'false');
    formData.append('OCREngine', '2');  // Engine2 = 精度重視

    const res = await fetch('https://api.ocr.space/parse/image', {
      method: 'POST',
      body: formData
    });

    progressFill.style.width = '80%';

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();

    if (data.IsErroredOnProcessing) {
      const msg = Array.isArray(data.ErrorMessage) ? data.ErrorMessage.join(' ') : (data.ErrorMessage || 'OCRエラー');
      // APIキーが無効な場合はリセット
      if (msg.includes('Invalid') || msg.includes('invalid') || res.status === 403) {
        localStorage.removeItem('ocr_api_key');
        updateKeyUI();
      }
      throw new Error(msg);
    }

    const rawText = data.ParsedResults?.[0]?.ParsedText || '';
    progressFill.style.width = '100%';
    overlay.classList.remove('show');

    console.log('OCR text:', rawText);

    if (!rawText.trim()) {
      showBanner('error', '❌ テキストを読み取れませんでした。明るい場所でまっすぐ撮影してみてください。');
      return;
    }

    const parsed = parseReceiptText(rawText);
    const count = applyParsedData(parsed);

    if (count >= 3) {
      showBanner('success', `✅ ${count}項目を自動入力しました。内容を確認してください。`);
    } else if (count >= 1) {
      showBanner('partial', `⚠️ ${count}項目を入力しました。残りは手動で補完してください。`);
    } else {
      showBanner('error', '❌ 読み取れませんでした。手動で入力してください。');
    }

  } catch (err) {
    overlay.classList.remove('show');
    showBanner('error', `❌ エラー: ${err.message}<br><span style="font-size:11px;font-weight:normal">手動で入力するか、APIキーを確認してください。</span>`);
    console.error('OCR Error:', err);
  }
}

function showBanner(type, html) {
  const b = document.getElementById('ocrResultBanner');
  b.className = `ocr-result-banner ${type} show`;
  b.innerHTML = html;
}
function hideBanner() {
  document.getElementById('ocrResultBanner').className = 'ocr-result-banner';
}

// ==============================
// レシートテキスト解析
// ==============================
function parseReceiptText(rawText) {
  // 全角数字→半角、スペース正規化
  const text = rawText
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/[，、]/g, ',')
    .replace(/[¥￥]/g, '¥')
    .replace(/\r\n/g, '\n');

  const result = {};
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  // ---- 金額 ----
  const amountPats = [
    /(?:税込)?(?:合\s*計|領収金額|請求金額|お支払|ご請求)[^\d]*([0-9,]{3,})/i,
    /合\s*計\s*¥?\s*([0-9,]{3,})/i,
    /¥\s*([0-9,]{4,})/,
    /([0-9,]{4,})\s*円/,
  ];
  for (const pat of amountPats) {
    const m = text.match(pat);
    if (m) {
      const num = parseInt(m[1].replace(/,/g, ''), 10);
      if (num > 0 && num < 10000000) { result.amount = num; break; }
    }
  }
  // フォールバック：最大の数値
  if (!result.amount) {
    let maxNum = 0;
    for (const line of lines) {
      for (const n of (line.match(/[0-9,]{3,}/g) || [])) {
        const v = parseInt(n.replace(/,/g, ''), 10);
        if (v > maxNum && v < 1000000) maxNum = v;
      }
    }
    if (maxNum > 0) result.amount = maxNum;
  }

  // ---- 日付 ----
  const datePats = [
    { re: /(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/, fn: m => `${m[1]}-${p2(m[2])}-${p2(m[3])}` },
    { re: /令和\s*(\d+)\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*日/, fn: m => `${2018+parseInt(m[1])}-${p2(m[2])}-${p2(m[3])}` },
    { re: /[Rr][\s.]?(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/, fn: m => `${2018+parseInt(m[1])}-${p2(m[2])}-${p2(m[3])}` },
    { re: /(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/, fn: m => `${m[1]}-${p2(m[2])}-${p2(m[3])}` },
    { re: /(\d{2})\/(\d{1,2})\/(\d{1,2})/, fn: m => `20${m[1]}-${p2(m[2])}-${p2(m[3])}` },
  ];
  for (const { re, fn } of datePats) {
    const m = text.match(re);
    if (m) {
      const d = fn(m);
      const dt = new Date(d);
      if (!isNaN(dt) && dt.getFullYear() >= 2000 && dt.getFullYear() <= 2035) { result.date = d; break; }
    }
  }

  // ---- 税率 ----
  if (/軽減税率|[※\*]\s*8\s*%|8\s*%/.test(text)) result.tax = '8';
  else if (/10\s*%|消費税/.test(text)) result.tax = '10';

  // ---- 店名 ----
  const skipPats = [/^\d+$/, /^\d{4}[年\/\-]/, /^[Rr]\d/, /^tel/i, /^〒/, /^[0-9\-\(\)\s]+$/, /^https?/i, /^No\./i, /^T\d{13}/];
  for (const line of lines.slice(0, 10)) {
    const cl = line.replace(/[\s　]+/g, ' ').trim();
    if (cl.length < 2) continue;
    if (skipPats.some(p => p.test(cl))) continue;
    if (/^[\d,¥\s]+$/.test(cl)) continue;
    if ((cl.match(/\d/g) || []).length / cl.length > 0.55) continue;
    result.store = cl.substring(0, 30);
    break;
  }

  // ---- カテゴリ推定 ----
  const cats = {
    'ガソリン': ['ガソリン','エネオス','ENEOS','出光','コスモ','燃料','SS','ＳＳ'],
    '駐車場代': ['駐車','パーキング','タイムズ','コインパーク','Parking'],
    '消耗品費': ['コーナン','コメリ','カインズ','ホームセンター','資材','材料'],
    '事務用品': ['文具','コクヨ','事務用','プリンタ','インク'],
    '会議費': ['カフェ','喫茶','スターバックス','ドトール','コーヒー','珈琲'],
    '運賃': ['宅急便','ヤマト','佐川','運賃','配送','郵便'],
    '水道光熱': ['電気','ガス料','水道','東電','関電'],
  };
  for (const [cat, kws] of Object.entries(cats)) {
    if (kws.some(k => text.includes(k))) { result.category = cat; break; }
  }

  return result;
}

function p2(n) { return String(parseInt(n)).padStart(2, '0'); }

function applyParsedData(parsed) {
  let count = 0;
  if (parsed.date)     { setField('fDate', parsed.date); count++; }
  if (parsed.amount)   { setField('fAmount', parsed.amount); count++; }
  if (parsed.store)    { setField('fStore', parsed.store); count++; }
  if (parsed.tax)      { document.getElementById('fTax').value = parsed.tax; count++; }
  if (parsed.category) { document.getElementById('fCategory').value = parsed.category; }
  return count;
}

function setField(id, value) {
  const el = document.getElementById(id);
  el.value = value;
  el.classList.add('auto-filled');
  el.addEventListener('input', () => el.classList.remove('auto-filled'), { once: true });
}

// ==============================
// 保存・フォームリセット
// ==============================
function saveExpense() {
  const name   = document.getElementById('userName').value.trim();
  const date   = document.getElementById('fDate').value;
  const amount = Number(document.getElementById('fAmount').value);
  const store  = document.getElementById('fStore').value.trim();
  if(!name || !date || !amount || !store) return alert('氏名・日付・金額・店名をすべて入力してください');

  expenses.unshift({
    id: Date.now(), date, amount, store,
    motouke: document.getElementById('fMotouke').value.trim(),
    genba:   document.getElementById('fGenba').value.trim(),
    tax:      document.getElementById('fTax').value,
    category: document.getElementById('fCategory').value,
    memo:     document.getElementById('fMemo').value,
    img: currentImg
  });
  localStorage.setItem('exp_v5', JSON.stringify(expenses));
  resetForm();
  switchTab('list', document.getElementById('nav-li'));
}

function resetForm() {
  currentImg = null;
  document.getElementById('uploadSection').style.display = 'block';
  document.getElementById('previewWrap').classList.remove('show');
  ['fAmount','fStore','fMemo','fMotouke','fGenba'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  hideBanner();
  document.querySelectorAll('.auto-filled').forEach(el => el.classList.remove('auto-filled'));
  document.querySelectorAll('input[type=file]').forEach(i => i.value = '');
}

function renderList() {
  const cont = document.getElementById('expenseCards');
  if(!expenses.length) { cont.innerHTML = '<div style="text-align:center;padding:40px;color:#999">データなし</div>'; return; }
  cont.innerHTML = expenses.map(e => `
    <div class="expense-card">
      <div>
        <div style="font-weight:bold;font-size:14px">${esc(e.store)}</div>
        <div style="font-size:11px;color:#666">${e.date} · <span class="cat-badge">${e.category}</span><br>🏢 ${esc(e.motouke||'')} / ${esc(e.genba||'')}</div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:bold;color:var(--primary);font-size:16px">¥${e.amount.toLocaleString()}</div>
        <button onclick="del(${e.id})" style="font-size:10px;color:var(--danger);border:none;background:none;padding:4px">削除</button>
      </div>
    </div>`).join('');
}

function del(id) {
  if(!confirm('削除しますか？')) return;
  expenses = expenses.filter(e => e.id !== id);
  localStorage.setItem('exp_v5', JSON.stringify(expenses));
  renderList();
}

function exportJSON() {
  const name = document.getElementById('userName').value.trim();
  if(!expenses.length) return alert('データなし');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify({name, expenses})], {type:'application/json'}));
  a.download = `経費申請_${name}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function esc(s) { return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

async function resizeImg(file, max) {
  return new Promise(res => {
    const r = new FileReader(); r.onload = e => {
      const img = new Image(); img.onload = () => {
        const c = document.createElement('canvas');
        const ratio = Math.min(1, max/img.width, max/img.height);
        c.width = img.width*ratio; c.height = img.height*ratio;
        const ctx = c.getContext('2d');
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height); ctx.drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg', 0.85));
      }; img.src = e.target.result;
    }; r.readAsDataURL(file);
  });
}
