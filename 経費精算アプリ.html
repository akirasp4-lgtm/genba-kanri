<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<title>経費レシート提出</title>
<style>
:root {
  --primary: #2563eb; --primary-light: #eff6ff; 
  --success: #16a34a; --danger: #dc2626; 
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-400: #9ca3af; --gray-500: #6b7280; --gray-700: #374151;
  --shadow: 0 2px 4px rgba(0,0,0,.1);
  --r: 8px; --rs: 4px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: sans-serif; background: #f0f4f8; color: #333; padding-bottom: calc(60px + var(--safe-bottom)); }

/* ===== HEADER ===== */
.header { background: white; height: 56px; display: flex; align-items: center; padding: 0 16px; font-weight: bold; color: var(--primary); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; justify-content: space-between; }
.desktop-tabs { display: none; }

/* ===== MAIN ===== */
.main { max-width: 640px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
@media (min-width: 640px) {
  .main { max-width: 800px; padding: 24px; gap: 20px; }
}

.card { background: white; border-radius: var(--r); box-shadow: var(--shadow); padding: 16px; }
.card-title { font-size: 14px; font-weight: bold; border-bottom: 2px solid var(--gray-100); padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;}

/* ===== FORMS ===== */
.input-group { margin-bottom: 12px; }
.label { display: block; font-size: 12px; font-weight: bold; color: var(--gray-500); margin-bottom: 4px; }
.label.required::after { content: "必須"; background: var(--danger); color: white; font-size: 10px; padding: 2px 4px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
.control { width: 100%; padding: 12px; border: 1px solid var(--gray-200); border-radius: var(--rs); font-size: 16px; background: var(--gray-50); }
.control:focus { outline: none; border-color: var(--primary); background: white; }

/* ===== BUTTONS ===== */
.btn { width: 100%; padding: 14px; border: none; border-radius: var(--r); font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; }
.btn:active { opacity: 0.8; }
.btn-primary { background: var(--primary); color: white; }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; padding: 8px; font-size: 12px; }

/* ===== UPLOAD AREA ===== */
.camera-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.camera-btn { background: var(--primary-light); color: var(--primary); border: 2px dashed #bfdbfe; padding: 24px 10px; text-align: center; border-radius: var(--r); font-weight: bold; position: relative; cursor: pointer; }
.camera-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

/* PC用 ドロップエリア */
.upload-zone {
  display: none; 
  border: 2px dashed var(--gray-300); border-radius: var(--r);
  padding: 32px 16px; text-align: center; cursor: pointer;
  transition: all .2s; background: var(--gray-50); position: relative;
  margin-bottom: 16px;
}
@media (min-width: 640px) {
  .upload-zone { display: block; } 
}
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--primary); background: var(--primary-light); }
.upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-icon { font-size: 36px; margin-bottom: 10px; display: block; }
.upload-text { font-size: 14px; color: var(--gray-700); margin-bottom: 4px; font-weight: bold; }
.upload-sub { font-size: 12px; color: var(--gray-400); }

.preview-img { width: 100%; max-height: 300px; object-fit: contain; border-radius: var(--rs); display: none; margin-bottom: 16px; background: var(--gray-100); }

/* ===== LIST ===== */
.list-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); align-items: center;}
.list-img { width: 60px; height: 60px; object-fit: cover; border-radius: var(--rs); background: var(--gray-100); }
.list-info { flex: 1; }

/* ===== NAV & TABS ===== */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; height: calc(60px + var(--safe-bottom)); padding-bottom: var(--safe-bottom); border-top: 1px solid var(--gray-200); z-index: 100; }
.nav-btn { flex: 1; background: none; border: none; font-size: 12px; font-weight: bold; color: var(--gray-400); cursor: pointer; }
.nav-btn.active { color: var(--primary); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* PC用のタブ切り替えスタイル */
@media (min-width: 640px) {
  .nav { display: none; } 
  body { padding-bottom: 0; }
  .desktop-tabs { display: flex; gap: 4px; background: var(--gray-100); border-radius: var(--rs); padding: 3px; }
  .tab-btn { padding: 6px 14px; border: none; background: transparent; color: var(--gray-500); font-size: 13px; font-weight: 500; border-radius: 4px; cursor: pointer; }
  .tab-btn.active { background: white; color: var(--primary); box-shadow: var(--shadow); font-weight: bold; }
}
</style>
</head>
<body>

<header class="header">
  <div>📸 経費レシート提出</div>
  
  <div class="desktop-tabs">
    <button class="tab-btn active" onclick="switchTab('input', this, 'nav-input')">📷 撮影/入力</button>
    <button class="tab-btn" onclick="switchTab('list', this, 'nav-list')">📋 確認・出力</button>
  </div>
</header>

<main class="main">
  <div class="card">
    <div class="input-group">
      <label class="label required">👤 あなたの名前</label>
      <input type="text" class="control" id="userName" placeholder="山田 太郎" oninput="saveName()">
    </div>
  </div>

  <!-- 提出タブ -->
  <div id="tab-input" class="tab-content active">
    <div class="card">
      <div class="card-title">レシート追加</div>
      
      <div id="uploadSection">
        <div class="upload-zone" id="dropZone">
          <input type="file" accept="image/*" onchange="handleImage(this)">
          <span class="upload-icon">📄</span>
          <div class="upload-text">ここにレシート画像をドロップ（PC用）</div>
          <div class="upload-sub">クリックしてファイルを選択することもできます</div>
        </div>

        <div class="camera-area">
          <label class="camera-btn">
            <input type="file" accept="image/*" capture="environment" onchange="handleImage(this)">
            📷 カメラで撮影
          </label>
          <label class="camera-btn">
            <input type="file" accept="image/*" onchange="handleImage(this)">
            🖼️ 写真を選ぶ
          </label>
        </div>
      </div>

      <img id="preview" class="preview-img">

      <div id="formArea" style="display:none;">
        <div class="input-group">
          <label class="label required">📅 日付</label>
          <input type="date" class="control" id="fDate">
        </div>
        <div class="input-group">
          <label class="label required">💴 金額</label>
          <input type="number" class="control" id="fAmount" placeholder="レシートの合計金額" pattern="\d*" min="0">
        </div>
        <div class="input-group">
          <label class="label">📝 メモ（店名や用途など）</label>
          <input type="text" class="control" id="fMemo" placeholder="空欄でもOK">
        </div>
        <button class="btn btn-success" onclick="saveData()">💾 保存する</button>
        <button class="btn" style="background:transparent; color:var(--gray-500); margin-top:8px;" onclick="resetForm()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 一覧タブ -->
  <div id="tab-list" class="tab-content">
    <div class="card">
      <div class="card-title">
        <span>📋 提出待ちリスト</span>
        <button class="btn-success" style="padding:6px 12px; font-size:12px; border:none; border-radius:4px; font-weight:bold; cursor:pointer;" onclick="exportJSON()">📤 管理者へ出力</button>
      </div>
      <div id="listWrap"></div>
      <button class="btn btn-danger" style="margin-top:16px;" onclick="clearData()">🗑️ 全データを削除</button>
    </div>
  </div>
</main>

<nav class="nav">
  <button class="nav-btn active" id="nav-input" onclick="switchTab('input', document.querySelectorAll('.tab-btn')[0], 'nav-input')">📷 撮影/入力</button>
  <button class="nav-btn" id="nav-list" onclick="switchTab('list', document.querySelectorAll('.tab-btn')[1], 'nav-list')">📋 確認・出力</button>
</nav>

<script>
let currentImg = null;
let expenses = [];

// XSS対策（無害化処理）
function esc(s) {
  return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

document.addEventListener('DOMContentLoaded', () => {
  try {
    expenses = JSON.parse(localStorage.getItem('my_receipts') || '[]');
  } catch(e) {
    expenses = [];
  }
  document.getElementById('userName').value = localStorage.getItem('my_name') || '';
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  renderList();
  setupDropZone();
});

function saveName() {
  localStorage.setItem('my_name', document.getElementById('userName').value.trim());
}

function switchTab(tab, desktopBtn, navId) {
  document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  
  document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
  if (desktopBtn) desktopBtn.classList.add('active');
  
  document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
  if (navId) document.getElementById(navId).classList.add('active');
  
  if(tab === 'list') renderList();
}

function setupDropZone() {
  const zone = document.getElementById('dropZone');
  if(!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) {
      handleImage({ files: [f] });
    }
  });
}

async function handleImage(input) {
  const file = input.files[0];
  if(!file) return;
  
  try {
    currentImg = await resizeImage(file, 800); 
    document.getElementById('preview').src = currentImg;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('uploadSection').style.display = 'none';
    document.getElementById('formArea').style.display = 'block';
  } catch(e) {
    alert("画像の読み込みに失敗しました。");
    resetForm();
  }
}

function saveData() {
  const name = document.getElementById('userName').value.trim();
  const date = document.getElementById('fDate').value;
  const amountVal = document.getElementById('fAmount').value;
  const numAmount = Number(amountVal);
  
  if(!name) { alert('上に名前を入力してください！'); return; }
  if(!date) { alert('日付を入力してください！'); return; }
  if(!amountVal || isNaN(numAmount) || numAmount < 0) { 
    alert('正しい金額（0以上の数値）を入力してください！'); 
    return; 
  }
  
  const entry = {
    id: Date.now(),
    date: date,
    amount: numAmount,
    memo: document.getElementById('fMemo').value,
    img: currentImg
  };

  expenses.unshift(entry);
  
  // 容量超過（QuotaExceededError）の保護回路
  try {
    localStorage.setItem('my_receipts', JSON.stringify(expenses));
    resetForm();
    alert('保存しました！続けて入力できます。');
  } catch (e) {
    if (e.name === 'QuotaExceededError' || e.message.includes('quota')) {
      alert('⚠️ 保存容量が限界です。\n「確認・出力」からデータを送信し、「全データ削除」を行ってください。');
      expenses.shift(); // 追加分を取り消す（ロールバック）
    } else {
      alert('保存に失敗しました: ' + e.message);
    }
  }
}

function resetForm() {
  currentImg = null;
  document.getElementById('preview').style.display = 'none';
  document.getElementById('uploadSection').style.display = 'block';
  document.getElementById('formArea').style.display = 'none';
  document.getElementById('fAmount').value = '';
  document.getElementById('fMemo').value = '';
  document.querySelectorAll('input[type=file]').forEach(i => i.value = '');
}

function renderList() {
  const wrap = document.getElementById('listWrap');
  if(expenses.length === 0) { wrap.innerHTML = '<div style="color:gray;text-align:center;padding:30px;">データがありません</div>'; return; }
  
  wrap.innerHTML = expenses.map(e => `
    <div class="list-item">
      <img src="${e.img}" class="list-img">
      <div class="list-info">
        <div style="font-size:12px;color:gray">${esc(e.date)}</div>
        <div style="font-weight:bold; font-size:16px; color:var(--primary);">¥${Number(e.amount).toLocaleString()}</div>
        <div style="font-size:12px; margin-top:2px;">${esc(e.memo) || 'メモなし'}</div>
      </div>
      <button class="btn-danger" onclick="deleteItem(${e.id})">削除</button>
    </div>
  `).join('');
}

function deleteItem(id) {
  if(!confirm('この経費を削除しますか？')) return;
  expenses = expenses.filter(e => e.id !== id);
  localStorage.setItem('my_receipts', JSON.stringify(expenses));
  renderList();
}

function clearData() {
  if(!confirm('出力は終わりましたか？全てのデータを消去します。')) return;
  expenses = [];
  localStorage.removeItem('my_receipts');
  resetForm(); // 状態の不整合を防ぐためUIも強制リセット
  renderList();
}

function exportJSON() {
  const name = document.getElementById('userName').value.trim() || '未設定';
  if(expenses.length === 0) { alert('データがありません'); return; }
  
  const payload = { name: name, date: new Date().toISOString(), expenses: expenses };
  const blob = new Blob([JSON.stringify(payload)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `レシート_${name}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

async function resizeImage(file, maxSize) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ratio = Math.min(1, maxSize / img.width, maxSize / img.height);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        res(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.onerror = () => rej(new Error("Image processing failed"));
      img.src = e.target.result;
    };
    reader.onerror = () => rej(new Error("File read failed"));
    reader.readAsDataURL(file);
  });
}
</script>
</body>
</html>
