<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2563eb">
<title>経費レシート提出</title>
<style>
:root {
  --primary: #2563eb; --primary-light: #eff6ff; 
  --success: #16a34a; --danger: #dc2626; 
  --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-400: #9ca3af; --gray-500: #6b7280; --gray-700: #374151;
  --shadow: 0 2px 4px rgba(0,0,0,.1);
  --r: 8px; --rs: 4px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: sans-serif; background: #f0f4f8; color: #333; padding-bottom: calc(60px + var(--safe-bottom)); }

.header { background: white; height: 56px; display: flex; align-items: center; padding: 0 16px; font-weight: bold; color: var(--primary); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
.main { max-width: 600px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

.card { background: white; border-radius: var(--r); box-shadow: var(--shadow); padding: 16px; }
.card-title { font-size: 14px; font-weight: bold; border-bottom: 2px solid var(--gray-100); padding-bottom: 8px; margin-bottom: 12px; display: flex; justify-content: space-between;}

.input-group { margin-bottom: 12px; }
.label { display: block; font-size: 12px; font-weight: bold; color: var(--gray-500); margin-bottom: 4px; }
.control { width: 100%; padding: 12px; border: 1px solid var(--gray-200); border-radius: var(--rs); font-size: 16px; background: var(--gray-50); }
.control:focus { outline: none; border-color: var(--primary); background: white; }

.btn { width: 100%; padding: 14px; border: none; border-radius: var(--r); font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary { background: var(--primary); color: white; }
.btn-success { background: var(--success); color: white; }
.btn-danger { background: var(--danger); color: white; padding: 8px; font-size: 12px; }

.camera-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.camera-btn { background: var(--primary-light); color: var(--primary); border: 2px dashed #bfdbfe; padding: 24px 10px; text-align: center; border-radius: var(--r); font-weight: bold; position: relative; }
.camera-btn input { position: absolute; inset: 0; opacity: 0; }
.preview-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: var(--rs); display: none; margin-bottom: 16px; background: var(--gray-100); }

.list-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); align-items: center;}
.list-img { width: 60px; height: 60px; object-fit: cover; border-radius: var(--rs); background: var(--gray-100); }
.list-info { flex: 1; }

.nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; height: calc(60px + var(--safe-bottom)); padding-bottom: var(--safe-bottom); border-top: 1px solid var(--gray-200); z-index: 100; }
.nav-btn { flex: 1; background: none; border: none; font-size: 12px; font-weight: bold; color: var(--gray-400); }
.nav-btn.active { color: var(--primary); }

.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>
<body>

<header class="header">📸 経費レシート提出</header>

<main class="main">
  <div class="card">
    <div class="input-group">
      <label class="label">👤 あなたの名前（必須）</label>
      <input type="text" class="control" id="userName" placeholder="山田 太郎" oninput="saveName()">
    </div>
  </div>

  <!-- 提出タブ -->
  <div id="tab-input" class="tab-content active">
    <div class="card">
      <div class="card-title">レシート追加</div>
      
      <div class="camera-area" id="cameraArea">
        <label class="camera-btn">
          <input type="file" accept="image/*" capture="environment" onchange="handleImage(this)">
          📷 カメラで撮影
        </label>
        <label class="camera-btn">
          <input type="file" accept="image/*" onchange="handleImage(this)">
          🖼️ 写真を選ぶ
        </label>
      </div>

      <img id="preview" class="preview-img">

      <div id="formArea" style="display:none;">
        <div class="input-group">
          <label class="label">📅 日付</label>
          <input type="date" class="control" id="fDate">
        </div>
        <div class="input-group">
          <label class="label">💴 金額（任意）</label>
          <input type="number" class="control" id="fAmount" placeholder="空欄でもOK">
        </div>
        <div class="input-group">
          <label class="label">📝 メモ（店名や用途など）</label>
          <input type="text" class="control" id="fMemo" placeholder="空欄でもOK">
        </div>
        <button class="btn btn-success" onclick="saveData()">💾 保存する</button>
        <button class="btn" style="background:transparent; color:var(--gray-500); margin-top:8px;" onclick="resetForm()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 一覧タブ -->
  <div id="tab-list" class="tab-content">
    <div class="card">
      <div class="card-title">
        <span>📋 提出待ちリスト</span>
        <button class="btn-success" style="padding:4px 8px; font-size:12px; border:none; border-radius:4px;" onclick="exportJSON()">📤 管理者へ出力</button>
      </div>
      <div id="listWrap"></div>
      <button class="btn btn-danger" style="margin-top:16px;" onclick="clearData()">🗑️ 全データを削除</button>
    </div>
  </div>
</main>

<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('input', this)">📷 撮影</button>
  <button class="nav-btn" onclick="switchTab('list', this)">📋 確認・出力</button>
</nav>

<script>
let currentImg = null;
let expenses = JSON.parse(localStorage.getItem('my_receipts') || '[]');

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('userName').value = localStorage.getItem('my_name') || '';
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  renderList();
});

function saveName() {
  localStorage.setItem('my_name', document.getElementById('userName').value.trim());
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
  btn.classList.add('active');
  if(tab === 'list') renderList();
}

async function handleImage(input) {
  const file = input.files[0];
  if(!file) return;
  
  // スマホ向けに600pxで軽量化
  currentImg = await resizeImage(file, 600);
  
  document.getElementById('preview').src = currentImg;
  document.getElementById('preview').style.display = 'block';
  document.getElementById('cameraArea').style.display = 'none';
  document.getElementById('formArea').style.display = 'block';
}

function saveData() {
  const name = document.getElementById('userName').value.trim();
  if(!name) { alert('上に名前を入力してください！'); return; }
  
  expenses.unshift({
    id: Date.now(),
    date: document.getElementById('fDate').value,
    amount: document.getElementById('fAmount').value || 0,
    memo: document.getElementById('fMemo').value,
    img: currentImg
  });
  
  localStorage.setItem('my_receipts', JSON.stringify(expenses));
  resetForm();
  alert('保存しました！続けて撮影できます。');
}

function resetForm() {
  currentImg = null;
  document.getElementById('preview').style.display = 'none';
  document.getElementById('cameraArea').style.display = 'grid';
  document.getElementById('formArea').style.display = 'none';
  document.getElementById('fAmount').value = '';
  document.getElementById('fMemo').value = '';
  document.querySelectorAll('input[type=file]').forEach(i => i.value = '');
}

function renderList() {
  const wrap = document.getElementById('listWrap');
  if(expenses.length === 0) { wrap.innerHTML = '<div style="color:gray;text-align:center;padding:20px;">まだありません</div>'; return; }
  
  wrap.innerHTML = expenses.map(e => `
    <div class="list-item">
      <img src="${e.img}" class="list-img">
      <div class="list-info">
        <div style="font-size:12px;color:gray">${e.date}</div>
        <div style="font-weight:bold">${e.amount ? '¥'+Number(e.amount).toLocaleString() : '金額未入力'}</div>
        <div style="font-size:12px">${e.memo || 'メモなし'}</div>
      </div>
      <button class="btn-danger" onclick="deleteItem(${e.id})">削除</button>
    </div>
  `).join('');
}

function deleteItem(id) {
  if(!confirm('削除しますか？')) return;
  expenses = expenses.filter(e => e.id !== id);
  localStorage.setItem('my_receipts', JSON.stringify(expenses));
  renderList();
}

function clearData() {
  if(!confirm('出力は終わりましたか？全てのデータを消去します。')) return;
  expenses = [];
  localStorage.removeItem('my_receipts');
  renderList();
}

function exportJSON() {
  const name = document.getElementById('userName').value.trim() || '未設定';
  if(expenses.length === 0) { alert('データがありません'); return; }
  
  const payload = { name: name, date: new Date().toISOString(), expenses: expenses };
  const blob = new Blob([JSON.stringify(payload)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `レシート_${name}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

async function resizeImage(file, maxSize) {
  return new Promise((res) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ratio = Math.min(1, maxSize / img.width, maxSize / img.height);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        res(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
</script>
</body>
</html>
