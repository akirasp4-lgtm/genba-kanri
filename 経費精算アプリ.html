<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>経費精算アプリ</title>
<style>
:root {
  --primary: #2563eb; --primary-light: #eff6ff; --success: #16a34a; --success-light: #f0fdf4;
  --danger: #dc2626; --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
  --gray-400: #9ca3af; --gray-500: #6b7280; --gray-800: #1f2937; 
  --shadow: 0 1px 3px rgba(0,0,0,.1);
  --r: 10px; --bottom-nav-h: 64px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#f0f4f8;color:var(--gray-800);min-height:100vh;padding-bottom:calc(var(--bottom-nav-h) + var(--safe-bottom))}

/* ===== HEADER & DESKTOP NAV ===== */
.app-header{background:white;border-bottom:1px solid var(--gray-200);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.app-title{font-size:17px;font-weight:700;color:var(--primary)}

.desktop-tabs{display:none}
@media(min-width:640px){
  .desktop-tabs{display:flex;gap:4px;background:var(--gray-100);border-radius:6px;padding:3px}
  body{padding-bottom:0}
}
.tab-btn{padding:6px 14px;border:none;background:transparent;color:var(--gray-500);font-size:13px;font-weight:500;border-radius:4px;cursor:pointer}
.tab-btn.active{background:white;color:var(--primary);box-shadow:var(--shadow);font-weight:600}

/* ===== MAIN ===== */
.main{max-width:640px;margin:0 auto;padding:16px 12px;display:flex;flex-direction:column;gap:14px}
@media(min-width:640px){.main{max-width:800px;padding:24px 16px}}
.card{background:white;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;padding:16px;margin-bottom:14px}

/* ===== FORM ELEMENTS ===== */
.form-label{display:block;font-size:11px;font-weight:700;color:var(--gray-500);margin-bottom:4px;text-transform:uppercase}
.form-label.req::after{content:"*";color:var(--danger);margin-left:2px}
.form-control{width:100%;padding:12px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:16px;outline:none;background:white;margin-bottom:10px;font-family:inherit;transition:opacity 0.2s;}
.form-control:focus{border-color:var(--primary)}
.form-control:disabled {background-color: var(--gray-100); opacity: 0.7;}

/* ===== UPLOAD AREA (PC & MOBILE) ===== */
.upload-zone{
  display:none;border:2px dashed var(--gray-300);border-radius:var(--r);
  padding:40px 20px;text-align:center;cursor:pointer;background:var(--gray-50);
  transition:all .2s;margin-bottom:16px;position:relative;
}
.upload-zone:hover, .upload-zone.drag-over{border-color:var(--primary);background:var(--primary-light)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
@media(min-width:640px){.upload-zone{display:block}}

.capture-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.capture-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:20px 10px;border:2px dashed var(--gray-300);border-radius:var(--r);background:var(--gray-50);cursor:pointer;position:relative}
.capture-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}

.ai-status-bar { display: none; padding: 12px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; font-weight: bold; text-align: left; line-height: 1.5; }
.ai-status-bar.loading { display: block; background: var(--primary-light); color: var(--primary); }
.ai-status-bar.error { display: block; background: #fee2e2; color: var(--danger); border: 1px solid #fca5a5; }
.ai-status-bar.success { display: block; background: var(--success-light); color: var(--success); }

/* ===== PREVIEW & LIST ===== */
.preview-wrap{display:none}
.preview-wrap.show{display:block}
.receipt-thumb{width:120px;border-radius:6px;border:2px solid var(--gray-200);overflow:hidden;margin-bottom:14px}
.receipt-thumb img{width:100%;display:block}

.btn{width:100%;padding:14px;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-success{background:var(--success);color:white}
.btn-primary{background:var(--primary);color:white}
.btn-ghost{background:transparent;color:var(--gray-600);border:1px solid var(--gray-200)}
.btn:disabled{background:var(--gray-300);color:var(--gray-500);cursor:not-allowed;box-shadow:none}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--bottom-nav-h) + var(--safe-bottom));background:white;border-top:1px solid var(--gray-200);display:flex;z-index:200}
@media(min-width:640px){.bottom-nav{display:none}}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--gray-400);background:none;border:none}
.nav-btn.active{color:var(--primary)}

.expense-card{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid var(--gray-100)}
.cat-badge{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--gray-100)}

.api-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-bottom: 8px; display: inline-block; }
.api-off { background: var(--gray-200); color: var(--gray-500); }
.api-on { background: var(--success-light); color: var(--success); }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">📝 経費精算アプリ</div>
  <nav class="desktop-tabs">
    <button class="tab-btn active" id="desk-in" onclick="switchTab('input',this)">📝 入力</button>
    <button class="tab-btn" id="desk-li" onclick="switchTab('list',this)">📋 リスト</button>
  </nav>
</header>

<main class="main">
  <!-- CONFIG AREA -->
  <div class="card">
    <label class="form-label req">👤 あなたの氏名</label>
    <input type="text" class="form-control" id="userName" placeholder="山田 太郎" oninput="saveConfig()">
    
    <details id="apiConfigDetails">
      <summary style="font-size: 12px; color: var(--gray-500); cursor: pointer; margin-top: 5px;">🔧 AI自動入力の設定</summary>
      <div style="padding-top: 10px;">
        <div id="apiStatusBadge" class="api-badge api-off">AI未設定</div>
        <label class="form-label">Gemini APIキー</label>
        <input type="password" class="form-control" id="apiKey" placeholder="AIza..." oninput="saveConfig()">
        <p style="font-size: 11px; color: var(--gray-500);">※キーはブラウザにのみ保存されます。</p>
      </div>
    </details>
  </div>

  <!-- INPUT PANEL -->
  <div class="tab-panel active" id="panel-input">
    <div class="card">
      <div id="uploadSection">
        <div class="upload-zone" id="dropZone">
          <input type="file" accept="image/*" onchange="handleFile(this.files[0])">
          <div style="font-size:32px;margin-bottom:8px">📂</div>
          <div style="font-weight:bold">ここにレシート画像をドロップ</div>
          <div style="font-size:12px;color:var(--gray-500)">またはクリックしてファイルを選択</div>
        </div>

        <div class="capture-btns">
          <label class="capture-btn"><input type="file" accept="image/*" capture="environment" onchange="handleFile(this.files[0])">📸 カメラ</label>
          <label class="capture-btn"><input type="file" accept="image/*" onchange="handleFile(this.files[0])">🖼️ 写真選択</label>
        </div>
      </div>

      <!-- ステータスバー -->
      <div id="aiStatusBar" class="ai-status-bar"></div>

      <div class="preview-wrap" id="previewWrap">
        <div class="receipt-thumb"><img id="receiptImg" src=""></div>
        <div class="form-grid" id="formGrid">
          <label class="form-label req">📅 日付</label>
          <input type="date" class="form-control" id="fDate">
          
          <label class="form-label req">💴 金額（税込）</label>
          <input type="number" class="form-control" id="fAmount" placeholder="0" inputmode="numeric">
          
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div>
              <label class="form-label">📊 税率</label>
              <select class="form-control" id="fTax">
                <option value="10">10%</option>
                <option value="8">軽減8%</option>
                <option value="0">対象外</option>
              </select>
            </div>
            <div>
              <label class="form-label">📁 カテゴリー</label>
              <select class="form-control" id="fCategory">
                <option value="駐車場代">🚗 駐車場代 (パーキング)</option>
                <option value="仕入高">🛠️ 仕入高 (材料・部品・工具)</option>
                <option value="ガソリン">⛽ 車両費 (ガソリン代)</option>
                <option value="消耗品費">📦 消耗品費 (材料以外)</option>
                <option value="事務用品">🖊️ 事務用品</option>
                <option value="運賃">🚚 運賃 (宅急便など)</option>
                <option value="その他交通費">🚕 その他交通費 (タクシー等)</option>
                <option value="会議費">☕ 会議費 (社内飲食)</option>
                <option value="交際費">🤝 交際費 (社外飲食)</option>
                <option value="水道光熱">💡 水道光熱</option>
                <option value="租税公課">📜 租税公課 (印紙など)</option>
                <option value="福利厚生">🏥 福利厚生</option>
              </select>
            </div>
          </div>
          
          <label class="form-label req">🏪 店名</label>
          <input type="text" class="form-control" id="fStore" placeholder="例：コーナン">
          
          <label class="form-label">📝 メモ</label>
          <input type="text" class="form-control" id="fMemo" placeholder="用途など（任意）">
          
          <button class="btn btn-success" id="saveBtn" onclick="saveExpense()">💾 保存してリストへ</button>
          <button class="btn btn-ghost" id="cancelBtn" style="margin-top:8px" onclick="resetForm()">キャンセル</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LIST PANEL -->
  <div class="tab-panel" id="panel-list" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:14px;align-items:center">
        <span style="font-weight:bold">📋 保存済みリスト</span>
        <button class="btn btn-primary" style="width:auto;padding:8px 16px;font-size:12px" onclick="exportJSON()">📤 管理者へ出力</button>
      </div>
      <div id="expenseCards"></div>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-in" onclick="switchTab('input',this)">📝 入力</button>
  <button class="nav-btn" id="nav-li" onclick="switchTab('list',this)">📋 リスト</button>
</nav>

<script>
/**
 * 【管理者設定】
 * この "" の中に直接APIキー（AIza...）を貼り付けてもOKです。
 */
const embeddedApiKey = ""; 

let expenses = JSON.parse(localStorage.getItem('exp_v5') || '[]');
let currentImg = null;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('userName').value = localStorage.getItem('user_name_v5') || '';
  document.getElementById('apiKey').value = localStorage.getItem('api_key_v5') || '';
  
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
  updateApiStatus();
  setupDrop();
  renderList();
});

function saveConfig() {
  const name = document.getElementById('userName').value.trim();
  const key = document.getElementById('apiKey').value.trim();
  localStorage.setItem('user_name_v5', name);
  localStorage.setItem('api_key_v5', key);
  updateApiStatus();
}

function updateApiStatus() {
  const badge = document.getElementById('apiStatusBadge');
  const keyInStorage = localStorage.getItem('api_key_v5');
  
  if (embeddedApiKey) {
    badge.textContent = "✅ 社内共通AIが有効です";
    badge.className = "api-badge api-on";
  } else if (keyInStorage) {
    badge.textContent = "✅ 個別AI設定が有効です";
    badge.className = "api-badge api-on";
  } else {
    badge.textContent = "AI未設定 (手動入力)";
    badge.className = "api-badge api-off";
  }
}

function showStatus(text, type) {
  const bar = document.getElementById('aiStatusBar');
  if(!bar) return;
  // HTMLタグを許可して表示
  bar.innerHTML = text;
  bar.className = 'ai-status-bar ' + type;
}

// フォームの入力可否を切り替える（非同期競合防止）
function toggleFormState(disabled) {
  const inputs = document.getElementById('formGrid').querySelectorAll('input, select');
  inputs.forEach(el => el.disabled = disabled);
  document.getElementById('saveBtn').disabled = disabled;
  if(disabled) {
      document.getElementById('saveBtn').textContent = "⌛ 解析中...";
  } else {
      document.getElementById('saveBtn').textContent = "💾 保存してリストへ";
  }
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.getElementById('panel-' + tab).style.display = 'block';
  document.querySelectorAll('.tab-btn, .nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  if(tab==='input') {
    document.getElementById('nav-in').classList.add('active');
    document.getElementById('desk-in').classList.add('active');
  } else {
    document.getElementById('nav-li').classList.add('active');
    document.getElementById('desk-li').classList.add('active');
  }
  
  if(tab === 'list') renderList();
}

function setupDrop() {
  const zone = document.getElementById('dropZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
}

async function handleFile(file) {
  if(!file || !file.type.startsWith('image/')) return;
  currentImg = await resizeImg(file, 800);
  document.getElementById('uploadSection').style.display = 'none';
  document.getElementById('receiptImg').src = currentImg;
  document.getElementById('previewWrap').classList.add('show');
  
  const key = embeddedApiKey || localStorage.getItem('api_key_v5')?.trim();
  if(key) {
    analyzeAI(key, currentImg);
  }
}

async function analyzeAI(key, base64) {
  toggleFormState(true); // フォームをロック
  showStatus("✨ AIが読み取りを行っています...", "loading");

  // フォールバック用のモデルリスト（事前検索によるエラーを排除）
  const modelsToTry = ["gemini-1.5-flash", "gemini-1.5-flash-latest", "gemini-1.5-pro"];
  let success = false;
  let lastErrorMessage = "不明なエラーが発生しました";

  for (const model of modelsToTry) {
    try {
      showStatus(`✨ AI (${model}) で解析中...`, "loading");
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;

      const res = await fetch(url, {
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          contents: [{ 
            parts: [
              { text: "Extract receipt info as JSON. Fields: {date:YYYY-MM-DD, amount:number, store, tax:10|8|0, category, memo}. Category must be one of: 駐車場代, 仕入高, ガソリン, 消耗品費, 事務用品, 運賃, その他交通費, 会議費, 交際費, 水道光熱, 租税公課, 福利厚生. Only return raw JSON object without markdown." }, 
              { inlineData: { mimeType: "image/jpeg", data: base64.split(',')[1] } }
            ] 
          }] 
        })
      });
      
      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        const errMsg = data.error?.message || `HTTPエラー ${res.status}`;
        
        // 1. APIキー無効化の確定エラー（致命的なので即中断）
        if (res.status === 400 && errMsg.includes("API key not valid")) {
            throw new Error(`🚨 <b>APIキーが無効です。</b><br>GitHub等に公開したため、Googleに自動停止（無効化）された可能性が高いです。<br>Google AI Studioで「新しいキー」を再発行し、設定し直してください。`);
        }
        
        // 2. モデルが見つからないエラー（次のモデルを試す）
        if (res.status === 404 && errMsg.includes("not found")) {
            lastErrorMessage = `モデル ${model} が見つかりません。`;
            continue; 
        }

        // その他のエラー
        throw new Error(`APIエラー: ${errMsg}`);
      }

      const textContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!textContent) throw new Error('AIから有効な返答が得られませんでした。');

      // AI特有のマークダウンや余計な文字を強力に除去
      const match = textContent.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('AIの返答からデータを抽出できませんでした。');
      
      const r = JSON.parse(match[0]);
      if(r.date) document.getElementById('fDate').value = r.date;
      if(r.amount) document.getElementById('fAmount').value = r.amount;
      if(r.store) document.getElementById('fStore').value = r.store;
      if(r.tax !== undefined) document.getElementById('fTax').value = String(r.tax);
      if(r.category) document.getElementById('fCategory').value = r.category;
      if(r.memo) document.getElementById('fMemo').value = r.memo;
      
      showStatus("✅ 自動入力を完了しました", "success");
      setTimeout(() => { 
          const bar = document.getElementById('aiStatusBar');
          if(bar && bar.classList.contains('success')) bar.style.display='none'; 
      }, 3000);

      success = true;
      break; // 成功した場合はループを抜ける

    } catch(e) { 
      console.error('AI読み取り失敗:', e);
      lastErrorMessage = e.message;
      
      // 致命的なキーエラーの場合は他のモデルを試しても無駄なのでループを抜ける
      if (lastErrorMessage.includes("APIキーが無効です")) {
          break;
      }
    }
  }

  // 全てのモデルで失敗した場合
  if (!success) {
      showStatus(`❌ ${lastErrorMessage}`, "error");
  }
  
  toggleFormState(false); // フォームのロックを解除
}

function saveExpense() {
  const name = document.getElementById('userName').value.trim();
  const date = document.getElementById('fDate').value;
  const amount = Number(document.getElementById('fAmount').value);
  const store = document.getElementById('fStore').value.trim();
  if(!name || !date || !amount || !store) return alert('氏名・日付・金額・店名をすべて入力してください');

  const newExpense = { id: Date.now(), date, amount, store, tax: document.getElementById('fTax').value, category: document.getElementById('fCategory').value, memo: document.getElementById('fMemo').value, img: currentImg };
  
  expenses.unshift(newExpense);
  try {
    localStorage.setItem('exp_v5', JSON.stringify(expenses));
    resetForm(); 
    switchTab('list', document.getElementById('nav-li'));
  } catch (e) {
    expenses.shift();
    alert('【保存失敗】スマホのブラウザ保存容量（約5MB）がいっぱいです。\n「リスト」タブからデータを管理者へ出力した後、削除して空き容量を作ってください。');
  }
}

function resetForm() {
  currentImg = null; 
  document.getElementById('uploadSection').style.display = 'block';
  document.getElementById('previewWrap').classList.remove('show');
  const bar = document.getElementById('aiStatusBar');
  if(bar) bar.style.display = 'none';
  document.getElementById('fAmount').value = ''; 
  document.getElementById('fStore').value = '';
  document.getElementById('fMemo').value = '';
  document.querySelectorAll('input[type=file]').forEach(i => i.value = '');
}

function renderList() {
  const cont = document.getElementById('expenseCards');
  if(!expenses.length) { cont.innerHTML = '<div style="text-align:center;padding:40px;color:#999">データなし</div>'; return; }
  cont.innerHTML = expenses.map(e => `
    <div class="expense-card">
      <div>
        <div style="font-weight:bold;font-size:14px">${esc(e.store)} <span style="font-size:10px;color:#999">(${e.tax}%)</span></div>
        <div style="font-size:11px;color:#666">${e.date} · <span class="cat-badge">${e.category}</span></div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:bold;color:var(--primary);font-size:16px">¥${e.amount.toLocaleString()}</div>
        <button onclick="del(${e.id})" style="font-size:10px;color:var(--danger);border:none;background:none;padding:4px">削除</button>
      </div>
    </div>
  `).join('');
}

function del(id) {
  if(!confirm('この経費を削除しますか？')) return;
  expenses = expenses.filter(e => e.id !== id);
  localStorage.setItem('exp_v5', JSON.stringify(expenses));
  renderList();
}

function exportJSON() {
  const name = document.getElementById('userName').value.trim();
  if(!expenses.length) return alert('データがありません');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify({ name, expenses })], {type:'application/json'}));
  a.download = `経費申請_${name}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function esc(s) { return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

async function resizeImg(file, max) {
  return new Promise(res => {
    const r = new FileReader(); r.onload = e => {
      const img = new Image(); img.onload = () => {
        const c = document.createElement('canvas'); const ratio = Math.min(1, max/img.width, max/img.height);
        c.width = img.width*ratio; c.height = img.height*ratio;
        const ctx = c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height); ctx.drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg', 0.6));
      }; img.src = e.target.result;
    }; r.readAsDataURL(file);
  });
}
</script>
</body>
</html>
